name: Monorepo CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_API: ${{ secrets.TURBO_API }}

jobs:
  packages:
    name: Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint packages
        run: bun run packages:lint

      - name: Typecheck packages
        run: bun run packages:typecheck

      - name: Test packages
        run: bun run packages:test

      - name: Build packages
        run: bun run packages:build

      - name: Upload Turbo summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turbo-summaries-packages
          path: .turbo/runs/**
          if-no-files-found: ignore

  android:
    name: Android Shell
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Android local.properties
        working-directory: apps/android
        run: |
          printf "sdk.dir=%s\n" "$ANDROID_SDK_ROOT" > local.properties

      - name: Build Android app
        run: bun run android:build

      - name: Test Android app
        run: bun run android:test

      - name: Lint Android app
        run: bun run android:lint

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            apps/android/app/build/reports/**
            apps/android/app/build/test-results/**
          if-no-files-found: ignore

      - name: Upload Turbo summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turbo-summaries-android
          path: .turbo/runs/**
          if-no-files-found: ignore

  ios:
    name: iOS
    runs-on: macos-15
    timeout-minutes: 45
    needs: [packages]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install iOS toolchain helpers
        run: brew install xcodegen swiftgen

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pick simulator destination
        run: |
          UDID="$(xcrun simctl list devices available -j | python3 - <<'PY'
          import json, sys
          data=json.load(sys.stdin)
          for runtime in data.get("devices",{}).values():
              for device in runtime:
                  if device.get("isAvailable") and "iPhone" in device.get("name",""):
                      print(device["udid"])
                      raise SystemExit(0)
          raise SystemExit(1)
          PY
          )"
          echo "IOS_DESTINATION=platform=iOS Simulator,id=${UDID}" >> "$GITHUB_ENV"

      - name: Generate iOS project
        run: bun run ios:generate

      - name: Build iOS app
        run: bun run ios:build

      - name: Test iOS app (unit only)
        run: bun run ios:test:unit:scheme

      - name: Upload iOS xcresults
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcresults
          path: |
            apps/ios/build/*.xcresult
            apps/ios/build/**/*.xcresult
          if-no-files-found: ignore

      - name: Upload Turbo summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turbo-summaries-ios
          path: .turbo/runs/**
          if-no-files-found: ignore
